<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZTIM Dashboard — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-top: 3px solid #00ff88;
            border-radius: 10px;
            padding: 40px;
            width: 360px;
        }
        .login-card h1 {
            color: #00ff88;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            color: #888;
            font-size: 12px;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            background: #1a1f35;
            border: 1px solid #1e293b;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }
        .field input:focus {
            outline: none;
            border-color: #00ff88;
        }
        .login-btn {
            width: 100%;
            padding: 11px;
            background: #00ff88;
            color: #0a0e17;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:hover { background: #00e07a; }
        .error {
            background: #2a1015;
            border: 1px solid #ff0040;
            color: #ff6b8a;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ZTIM Dashboard</h1>
        <div class="subtitle">Zero-Trust Intelligent Monitoring</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="off" autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
